<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Déstockage — Paray FC</title>
  <meta name="description" content="Déstockage Paray FC : ancienne collection à prix réduits, tailles limitées. Pour commander : equipementparayfootclub@gmail.com.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Page plein écran : header + barre retour fixes en haut, catalogue qui défile dessous.
       Indispensable pour que le panier flottant de la page reste visible au défilement. */
    html { height:100%; }
    body.destock-page { height:100vh; height:100dvh; display:flex; flex-direction:column; overflow:hidden; }
    .destock-page .site-header { flex:none; }
    .destock-backbar { flex:none; background:#fff; border-bottom:1px solid var(--border); }
    .destock-backbar__inner { max-width:var(--maxw); margin:0 auto; padding:10px clamp(20px,5vw,40px); display:flex; flex-wrap:wrap; gap:10px 18px; align-items:center; justify-content:space-between; }
    .destock-backbar .breadcrumb a { color:var(--grey-text); }
    .destock-backbar .breadcrumb a:hover { color:var(--secondary); }
    .destock-backbar .breadcrumb { color:var(--grey-text); font-size:13px; font-weight:600; }
    .destock-backbar .breadcrumb .current { color:var(--navy); }
    .destock-frame { flex:1 1 auto; width:100%; min-height:0; border:0; display:block; background:#101331; }
  </style>
</head>
<body class="destock-page">

  <header class="site-header">
    <nav class="nav">
      <a href="index.html#accueil" class="nav__logo">
        <img src="images/logo-paray.webp" data-config-src="logoUrl" alt="Logo Paray FC" class="logo-img">
        <span class="logo-text">
          <span class="logo-name" data-config="clubName">Paray FC</span>
          <span class="logo-since" data-config="since">DEPUIS 1947</span>
        </span>
      </a>
      <div class="nav__links">
        <a href="index.html#accueil" class="nav__link">Accueil</a>
        <a href="club.html" class="nav__link">Le Club</a>
        <a href="equipes.html" class="nav__link">Nos Équipes</a>
        <a href="actualites.html" class="nav__link">Actualités</a>
        <a href="partenaires.html" class="nav__link">Partenaires</a>
        <a href="rejoindre.html" class="nav__link">Nous rejoindre</a>
        <a href="boutique.html" class="nav__link">Boutique</a>
        <a href="contact.html" class="nav__link">Contact</a>
        <a href="mailto:equipementparayfootclub@gmail.com" class="nav__cta">Commander</a>
      </div>
      <button class="nav__burger" data-burger aria-label="Menu" aria-expanded="false" aria-controls="mobile-menu">
        <span><span></span><span></span><span></span></span>
      </button>
    </nav>
    <div class="mobile-menu" id="mobile-menu" data-mobile-menu>
      <a href="index.html#accueil" class="mobile-menu__link">Accueil</a>
      <a href="club.html" class="mobile-menu__link">Le Club</a>
      <a href="equipes.html" class="mobile-menu__link">Nos Équipes</a>
      <a href="actualites.html" class="mobile-menu__link">Actualités</a>
      <a href="partenaires.html" class="mobile-menu__link">Partenaires</a>
      <a href="rejoindre.html" class="mobile-menu__link">Nous rejoindre</a>
      <a href="boutique.html" class="mobile-menu__link">Boutique</a>
      <a href="contact.html" class="mobile-menu__link">Contact</a>
      <a href="mailto:equipementparayfootclub@gmail.com" class="mobile-menu__cta">Commander par email</a>
    </div>
  </header>

  <!-- ============ FIL D'ARIANE + RETOUR ============ -->
  <div class="destock-backbar">
    <div class="destock-backbar__inner">
      <span class="breadcrumb"><a href="index.html">Accueil</a> <span class="sep">/</span> <a href="boutique.html">Boutique</a> <span class="sep">/</span> <span class="current">Déstockage</span></span>
      <a href="boutique.html" class="btn btn--navy" style="padding:9px 18px;font-size:13px;">← Retour à la boutique</a>
    </div>
  </div>

  <!-- ============ CATALOGUE DÉSTOCKAGE (page d'origine, intacte) ============ -->
  <iframe id="destock-frame" class="destock-frame" src="destockage-catalogue.html" title="Catalogue déstockage Paray FC"></iframe>

  <script src="js/config.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
